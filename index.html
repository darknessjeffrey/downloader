<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucifer Multi-Downloader | أدوات لوسيفر</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">LUCIFER'S ELITE</div>
            <h1>المحمل الشامل v2.0</h1>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-platform="all">الكل</button>
            <button class="tab-btn" data-platform="tiktok"><i class="fab fa-tiktok"></i> تيك توك</button>
            <button class="tab-btn" data-platform="instagram"><i class="fab fa-instagram"></i> انستجرام</button>
            <button class="tab-btn" data-platform="youtube"><i class="fab fa-youtube"></i> يوتيوب</button>
            <button class="tab-btn" data-platform="facebook"><i class="fab fa-facebook"></i> فيسبوك</button>
        </div>

        <div class="input-container">
            <input type="text" id="urlInput" placeholder="ضع الرابط هنا (فيديو، ريلز، استوري)...">
            <button id="downloadBtn">استخراج</button>
        </div>

        <div id="status" class="hidden">جاري اختراق السيرفرات... ⚡</div>

        <div id="results" class="result-box hidden">
            <img id="resImg" src="" alt="">
            <h3 id="resTitle"></h3>
            <div id="linksGrid" class="links-grid"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
